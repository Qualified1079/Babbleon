# Per-target build settings.
#
# For reproducible musl static builds:
#   cargo build --release --target x86_64-unknown-linux-musl --workspace
#
# The musl target is preferred for production:
#   - no glibc version skew across distros
#   - smaller, easier-to-audit binary
#   - `babbleon-ns-helper` becomes a single static blob

[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static",
]

[target.aarch64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static",
]
