name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Minimum-permission default for every job in this workflow.
# Individual jobs can opt in to more (none currently need it).
# Scorecard Token-Permissions check expects this block — without it
# the runner picks the repo default which is often `permissions:
# write-all` for the GITHUB_TOKEN.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: install libpam-dev
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace --all-targets
      - name: test
        run: cargo test --workspace --all-targets

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: audit
        run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-cyclonedx
        run: cargo install --locked cargo-cyclonedx
      - name: generate SBOM
        run: cargo cyclonedx --format json --output-cdx --override-filename babbleon-sbom
      - name: upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: babbleon-sbom
          path: "**/babbleon-sbom*.cdx.json"
          if-no-files-found: error
          retention-days: 90

  coverage:
    name: coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: install libpam-dev
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        run: cargo install --locked cargo-llvm-cov
      # The proptest job runs ~60 s; coverage adds overhead.  Exclude
      # the property suite so the coverage job stays under 5 minutes
      # — line + branch coverage on the unit + integration tests is
      # what we actually want to track.
      - name: collect coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info -- --skip mapping_properties
      - name: summarise
        run: cargo llvm-cov report --workspace -- --skip mapping_properties
      - uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          retention-days: 30

  miri:
    name: miri (UB in unsafe)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Miri runs a small subset — the unsafe-libc blocks (mkfifo, kill,
    # mlockall, prctl) plus the pure-Rust crypto + mapping paths.
    # Skipping the integration tests that shell out to `sh`, mount
    # namespaces, or call mkfifo for real — none of those are valid
    # under Miri.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: run miri on the pure-Rust crates
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
        # Limit to the mapping + crypto modules — the parts where UB
        # in our own (sparse) unsafe would actually have consequences.
        run: |
          cargo miri test -p babbleon --lib mapping:: crypto:: audit:: vault::attempts::
