name: openssf-scorecard

# OpenSSF Scorecard scheduled run.
# Publishes results to the Scorecards GitHub repository SARIF dashboard
# and produces a downloadable SARIF artifact.

on:
  branch_protection_rule:
  schedule:
    # Weekly, Tuesday 09:00 UTC.
    - cron: "0 9 * * 2"
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload SARIF to GitHub's code-scanning dashboard.
      security-events: write
      # Read repo metadata.
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Publish to the public Scorecards dashboard.  Public repo
          # only — this would fail open on private repos.
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: scorecard-results.sarif
          retention-days: 30

      - name: Upload to GitHub code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
