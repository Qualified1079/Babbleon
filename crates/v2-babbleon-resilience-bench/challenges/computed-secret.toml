# DEPRECATED — see ../CORRECTIONS.md
#
# This challenge's recovery target sits in a place L2+L3 do not
# scramble (string literal, chr() ordinals, or transition-table
# literals).  Any "crack rate" recorded against this challenge
# measures the absence of literal-scrambling, not scramble
# strength.  Do NOT add this challenge to a re-run.  See
# ../BENCHMARK-DESIGN.md for the literal-free challenge corpus
# specification.

name = "computed-secret"
goal_description = """
The Python source defines a function `auth(x)` that compares `x` against a value reconstructed at runtime from per-character ordinals.  No string literal containing the answer appears anywhere in the source.  Find the unique value of `x` for which `auth(x)` returns True.
"""
source = """
def auth(x):
    expected = chr(115) + chr(105) + chr(108) + chr(118) + chr(101) + chr(114) + chr(55)
    if x == expected:
        return True
    return False
"""

# The expected value is "silver7" (ASCII 115=s, 105=i, 108=l, 118=v,
# 101=e, 114=r, 55=7).  This challenge is the explicit
# negative-control test for the string-literal-leak doc's hypothesis
# (`docs/v2/string-literal-leak.md`): if the leak hypothesis is
# correct, an L2+L3 scramble should crack much less reliably on this
# challenge than on the four literal-only challenges, because the
# secret cannot be grepped — the model must reason about the
# computation.
[predicate]
kind = "exact-match"
expected = "silver7"
