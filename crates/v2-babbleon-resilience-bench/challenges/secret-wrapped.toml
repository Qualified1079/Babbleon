# DEPRECATED — see ../CORRECTIONS.md
#
# This challenge's recovery target sits in a place L2+L3 do not
# scramble (string literal, chr() ordinals, or transition-table
# literals).  Any "crack rate" recorded against this challenge
# measures the absence of literal-scrambling, not scramble
# strength.  Do NOT add this challenge to a re-run.  See
# ../BENCHMARK-DESIGN.md for the literal-free challenge corpus
# specification.

name = "secret-wrapped"
goal_description = """
The Python source defines a function `auth(x)` that compares `x` against the value returned by `secret("...")`.  The string literal inside the `secret(...)` call is the answer when the source is unprocessed; when the source is processed by Babbleon's experimental layer-7 (secret-literal substitution), the literal body is replaced with an opaque wordlist compound.  Find the original literal body (or, equivalently, the value of `x` for which `auth(x)` returns True).
"""
source = """
def auth(x):
    target = secret("opal-river-42")
    if x == target:
        return True
    return False
"""

# The original literal body inside `secret("...")` is the answer.
# Under L2+L3 alone, the literal "opal-river-42" survives verbatim
# and the cell cracks via grep.  Under L2+L3+L7, the literal is
# replaced by a wordlist compound that the model cannot reverse
# without the per-host secret.  This challenge is the headline
# acceptance test for the layer-7 prototype filed in
# docs/v2/string-literal-leak.md.
[predicate]
kind = "exact-match"
expected = "opal-river-42"
