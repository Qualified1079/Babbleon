# Literal-recovery challenge: string passphrase.
#
# Threat model: same as recover-integer-constant.  L2 scrambles
# string literals as whole tokens (the surrounding quotes are part
# of the token).  Recovering the original string requires the per-
# host secret.
#
# Why a high-entropy random-looking value: a dictionary word would
# let the model guess from semantic context ("auth", "passphrase").
# `f7Kx2qPmRa` has no English-corpus prior, so a correct answer
# must come from decoding the scramble, not from guessing.
#
# Expected outcome: FAIL under any config that includes L2.

name = "recover-string-literal"
goal_description = """
The Python source defines a function `check(x)` that compares its argument to a single string literal and returns True on equality.  What string literal does it compare against?  Submit just the string (no quotes).
"""
source = """
def check(x):
    return x == "f7Kx2qPmRa"
"""

[predicate]
kind = "exact-match"
expected = "f7Kx2qPmRa"
