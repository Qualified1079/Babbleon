# cargo-deny config
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "LicenseRef-PolyForm-Noncommercial-1.0.0",
]
confidence-threshold = 0.92

[[licenses.exceptions]]
allow = ["LicenseRef-PolyForm-Noncommercial-1.0.0"]
name = "babbleon"

[[licenses.exceptions]]
allow = ["LicenseRef-PolyForm-Noncommercial-1.0.0"]
name = "babbleon-cli"

[[licenses.exceptions]]
allow = ["LicenseRef-PolyForm-Noncommercial-1.0.0"]
name = "babbleon-ns-helper"

[[licenses.exceptions]]
allow = ["LicenseRef-PolyForm-Noncommercial-1.0.0"]
name = "babbleon-pam"

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
